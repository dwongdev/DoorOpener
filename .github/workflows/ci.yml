name: CI
permissions:
  contents: read

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  tests:
    name: Tests (pytest + coverage) / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest-cov

      - name: Prepare test config and env
        run: |
          cat > config.ini << 'EOF'
          [HomeAssistant]
          url = http://localhost:8123
          token = dummy_test_token
          switch_entity = switch.test_door

          [pins]
          testuser = 1234

          [admin]
          admin_password = testpass

          [server]
          port = 6532
          test_mode = true

          [security]
          max_attempts = 5
          block_time_minutes = 5
          max_global_attempts_per_hour = 50
          session_max_attempts = 3
          EOF

          cat > .env << 'EOF'
          DOOROPENER_PORT=6532
          TZ=UTC
          EOF

          mkdir -p tests
          cp config.ini tests/
          cp .env tests/

      - name: Run tests with coverage
        env:
          CONFIG_INI: tests/config.ini
          DOTENV: tests/.env
        run: |
          pytest --maxfail=1 --disable-warnings -q --cov=./ --cov-report=term-missing --cov-fail-under=75



  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-ruff
          restore-keys: ${{ runner.os }}-pip-ruff

      - name: Install Ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run ruff check
        run: ruff check .

      - name: Run ruff format check
        run: ruff format --check .


  bandit:
    name: Security (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-bandit
          restore-keys: ${{ runner.os }}-pip-bandit

      - name: Install Bandit
        run: |
          python -m pip install --upgrade pip
          pip install bandit

      - name: Run bandit
        run: bandit -c pyproject.toml -r .
